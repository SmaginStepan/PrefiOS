name: Pref
options:
  bundleIdPrefix: com.an0obis
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
packages:
  PrefEngine:
    path: PrefEngine
targets:
  Pref:
    type: application
    platform: iOS
    sources:
      - path: Pref/Sources
      - path: Pref/Resources/Assets.xcassets
      - path: Pref/Resources/Localizable.xcstrings
      - path: Pref/Resources/cards
        type: folder
        buildPhase: resources
      - path: Pref/Resources/tutorial.xml
        buildPhase: resources
      - path: Pref/Resources/tutorial_en.xml
        buildPhase: resources
      - path: Pref/Resources/tutorial_es.xml
        buildPhase: resources
      - path: Pref/Resources/dictionary.txt
        buildPhase: resources
    dependencies:
      - package: PrefEngine
    info:
      path: Pref/Info.plist
      properties:
        CFBundleDisplayName: Preferans
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "2"
        CFBundleDevelopmentRegion: en
        CFBundleLocalizations: [en, ru, es]
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        UISupportedInterfaceOrientations~ipad:
          [UIInterfaceOrientationPortrait, UIInterfaceOrientationPortraitUpsideDown,
           UIInterfaceOrientationLandscapeLeft, UIInterfaceOrientationLandscapeRight]
        UIUserInterfaceStyle: Dark
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        CURRENT_PROJECT_VERSION: 2
        MARKETING_VERSION: "1.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: XHBZVNJQ2J
